    <script>
        // Simple script to update copyright year
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // Hide header on scroll down, show on scroll up (gallery page)
        (function () {
            const header = document.querySelector('.page-header');
            if (!header) return;

            let lastScrollY = window.scrollY;
            let ticking = false;
            const scrollDeltaThreshold = 5;

            function onScrollUpdate() {
                const currentScrollY = window.scrollY;
                const delta = currentScrollY - lastScrollY;

                // Always show header near the very top of the page
                if (currentScrollY <= header.offsetHeight) {
                    header.classList.remove('page-header--hidden');
                    lastScrollY = currentScrollY;
                    ticking = false;
                    return;
                }

                // Ignore tiny scroll movements to avoid flicker
                if (Math.abs(delta) > scrollDeltaThreshold) {
                    if (delta > 0) {
                        // Scrolling down
                        header.classList.add('page-header--hidden');
                    } else {
                        // Scrolling up
                        header.classList.remove('page-header--hidden');
                    }
                    lastScrollY = currentScrollY;
                }

                ticking = false;
            }

            window.addEventListener('scroll', function () {
                if (!ticking) {
                    window.requestAnimationFrame(onScrollUpdate);
                    ticking = true;
                }
            }, { passive: true });
        })();
    </script>
